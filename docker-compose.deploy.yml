services:
  mongo:
    image: mongo:7
    container_name: lms-mongo
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: lms_demo
    volumes:
      - mongo-data:/data/db

  backend:
    image: ${BACKEND_IMAGE}:${BACKEND_TAG:-latest}
    container_name: lms-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGO_URL: mongodb://admin:admin@mongo:27017/lms_demo?authSource=admin
      JWT_SECRET: your_jwt_secret
      JWT_EXPIRES_IN: 1d
      UPLOADS_DIR: /app/uploads
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      - mongo
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    expose:
      - '3000'

  frontend:
    image: ${FRONTEND_IMAGE}:${FRONTEND_TAG:-latest}
    container_name: lms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    expose:
      - '80'

  nginx:
    image: nginx:1.27-alpine
    container_name: lms-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mongo-data:
  backend-uploads:
