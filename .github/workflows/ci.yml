name: Backend CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type Check
        run: npm run typecheck

      - name: Unit test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
