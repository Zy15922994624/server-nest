name: Deploy To Production

on:
  workflow_dispatch:
    inputs:
      backend_tag:
        description: Backend image tag
        required: true
        default: latest
      frontend_tag:
        description: Frontend image tag
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.SERVER_SSH_KEY != '' && secrets.DEPLOY_PATH != '' && secrets.BACKEND_IMAGE != '' && secrets.FRONTEND_IMAGE != '' && secrets.REGISTRY != '' && secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            export BACKEND_IMAGE="${{ secrets.BACKEND_IMAGE }}"
            export FRONTEND_IMAGE="${{ secrets.FRONTEND_IMAGE }}"
            export BACKEND_TAG="${{ github.event.inputs.backend_tag }}"
            export FRONTEND_TAG="${{ github.event.inputs.frontend_tag }}"

            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            docker compose -f docker-compose.deploy.yml pull backend frontend nginx mongo
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans

            curl -fsS http://127.0.0.1/api/ >/dev/null
            docker compose -f docker-compose.deploy.yml ps
