name: Deploy To Production

on:
  workflow_dispatch:
    inputs:
      backend_tag:
        description: Backend image tag
        required: true
        default: latest
      frontend_tag:
        description: Frontend image tag
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_IMAGE: ${{ secrets.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE }}
          REGISTRY: ${{ secrets.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -eu
          [ -n "$SERVER_HOST" ] || (echo "Missing secret: SERVER_HOST" && exit 1)
          [ -n "$SERVER_USER" ] || (echo "Missing secret: SERVER_USER" && exit 1)
          [ -n "$SERVER_SSH_KEY" ] || (echo "Missing secret: SERVER_SSH_KEY" && exit 1)
          [ -n "$DEPLOY_PATH" ] || (echo "Missing secret: DEPLOY_PATH" && exit 1)
          [ -n "$BACKEND_IMAGE" ] || (echo "Missing secret: BACKEND_IMAGE" && exit 1)
          [ -n "$FRONTEND_IMAGE" ] || (echo "Missing secret: FRONTEND_IMAGE" && exit 1)
          [ -n "$REGISTRY" ] || (echo "Missing secret: REGISTRY" && exit 1)
          [ -n "$REGISTRY_USERNAME" ] || (echo "Missing secret: REGISTRY_USERNAME" && exit 1)
          [ -n "$REGISTRY_PASSWORD" ] || (echo "Missing secret: REGISTRY_PASSWORD" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            mkdir -p "${{ secrets.DEPLOY_PATH }}/infra/nginx"

      - name: Sync deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.deploy.yml,infra/nginx/default.conf"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            pwd
            ls -la
            ls -la infra/nginx
            [ -f "docker-compose.deploy.yml" ] || (echo "Missing file: docker-compose.deploy.yml under DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}" && exit 1)
            [ -f "infra/nginx/default.conf" ] || (echo "Missing file: infra/nginx/default.conf under DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}" && exit 1)

            export BACKEND_IMAGE="${{ secrets.BACKEND_IMAGE }}"
            export FRONTEND_IMAGE="${{ secrets.FRONTEND_IMAGE }}"
            export BACKEND_TAG="${{ github.event.inputs.backend_tag }}"
            export FRONTEND_TAG="${{ github.event.inputs.frontend_tag }}"

            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            docker compose -f docker-compose.deploy.yml pull backend frontend nginx mongo
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans

            curl -fsS http://127.0.0.1/api/ >/dev/null
            docker compose -f docker-compose.deploy.yml ps
