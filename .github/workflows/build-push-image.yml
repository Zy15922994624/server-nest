name: Build And Push Backend Image

on:
  workflow_run:
    workflows: ['Backend CI']
    types: [completed]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.BACKEND_IMAGE }}

jobs:
  docker:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'main')) }}
    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Validate required secrets
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          BACKEND_IMAGE: ${{ secrets.BACKEND_IMAGE }}
        run: |
          set -eu
          [ -n "$REGISTRY" ] || (echo "Missing secret: REGISTRY" && exit 1)
          [ -n "$REGISTRY_USERNAME" ] || (echo "Missing secret: REGISTRY_USERNAME" && exit 1)
          [ -n "$REGISTRY_PASSWORD" ] || (echo "Missing secret: REGISTRY_PASSWORD" && exit 1)
          [ -n "$BACKEND_IMAGE" ] || (echo "Missing secret: BACKEND_IMAGE" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Derive short SHA tag
        id: vars
        run: |
          set -eu
          echo "short_sha=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
