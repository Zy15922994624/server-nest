name: Build And Push Backend Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.BACKEND_IMAGE }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          BACKEND_IMAGE: ${{ secrets.BACKEND_IMAGE }}
        run: |
          set -eu
          [ -n "$REGISTRY" ] || (echo "Missing secret: REGISTRY" && exit 1)
          [ -n "$REGISTRY_USERNAME" ] || (echo "Missing secret: REGISTRY_USERNAME" && exit 1)
          [ -n "$REGISTRY_PASSWORD" ] || (echo "Missing secret: REGISTRY_PASSWORD" && exit 1)
          [ -n "$BACKEND_IMAGE" ] || (echo "Missing secret: BACKEND_IMAGE" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
